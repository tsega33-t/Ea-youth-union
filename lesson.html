<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    
    <!-- SEO and Open Graph Tags for Real App Searchability -->
    <meta name="description" content="EA Youth Union - መንፈሳዊ ትምህርቶችን ያንብቡ፣ ያስቀምጡ እና ለሌሎች ያጋሩ።">
    <meta name="keywords" content="EA Youth Union, Ethiopian Orthodox, Spiritual Lessons, Youth Union App, ትምህርት">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://eayouthunion.web.app/">
    <meta property="og:title" content="EA Youth Union - Lesson Reader">
    <meta property="og:description" content="የEA Youth Union መተግበሪያን በመጠቀም ትምህርቶችን ያንብቡ፣ ያስቀምጡ እና ያጋሩ።">
    
    <title>EA Youth Union - Lesson Reader</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+Ethiopic:wght@400;600;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --md-sys-color-primary: #ffd700;
            --md-sys-color-on-primary: #1d1900;
            --bg: #ffffff;
            --surface: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border: #f0f0f0;
            --header-bg: rgba(255, 255, 255, 0.95);
            --highlight-default: rgba(255, 215, 0, 0.4);
            
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body.dark-mode {
            --bg: #121212;
            --surface: #1e1e1e;
            --text-main: #e3e3e3;
            --text-sub: #a0a0a0;
            --border: #2a2a2a;
            --header-bg: rgba(18, 18, 18, 0.95);
            --highlight-default: rgba(255, 215, 0, 0.3);
        }

        /* NATIVE APP BEHAVIOR ENFORCEMENT */
        html, body {
            width: 100vw; height: 100vh;
            overflow: hidden; 
            overscroll-behavior-y: none; 
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;           
            margin: 0; padding: 0;
            font-family: 'Noto Sans Ethiopic', 'Roboto', sans-serif;
            background-color: var(--bg); 
            color: var(--text-main);
            touch-action: pan-y;
        }

        /* Themes */
        .bg-sepia { --bg: #fbf0d9; --surface: #f4e8ce; --text-main: #5b4636; --header-bg: rgba(251, 240, 217, 0.95); --border: #e6dac3; }
        .bg-black { --bg: #000000; --surface: #111111; --text-main: #d4d4d4; --header-bg: rgba(0, 0, 0, 0.95); --border: #222222; }

        /* Header */
        header {
            padding: calc(12px + var(--safe-top)) 16px 12px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            border-bottom: 1px solid var(--border);
            transform: translateY(0); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        header.hide-header { transform: translateY(-100%); }

        .header-title { font-weight: 700; font-size: 16px; margin: 0; color: var(--text-main); text-overflow: ellipsis; white-space: nowrap; overflow: hidden; max-width: 50%; text-align: center;}
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--surface); border: 1px solid var(--border); color: var(--text-main); 
            font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); }

        .progress-container { width: 100%; height: 3px; position: absolute; bottom: -2px; left: 0; background: transparent;}
        .progress-bar { height: 100%; background: var(--md-sys-color-primary); width: 0%; transition: width 0.1s linear; border-radius: 0 3px 3px 0;}

        /* Scroll Area */
        .scroll-container {
            height: 100vh; width: 100vw;
            overflow-y: auto; overflow-x: hidden;
            scroll-behavior: smooth;
            padding-bottom: calc(150px + var(--safe-bottom));
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .lesson-cover-wrap { width: 100%; height: 30vh; min-height: 220px; position: relative; display: none; margin-bottom: 24px; }
        .lesson-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .cover-gradient { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 60%); }

        .lesson-text-area { padding: 0 20px; max-width: 700px; margin: 0 auto; margin-top: calc(80px + var(--safe-top));}
        .has-cover { margin-top: 0; }
        
        .lesson-header h1 { font-size: 26px; font-weight: 900; color: var(--text-main); margin: 0 0 10px 0; line-height: 1.4; }
        .lesson-meta { font-size: 13px; color: var(--text-sub); margin-bottom: 30px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        .lesson-meta i { color: var(--md-sys-color-primary); }

        .lesson-content {
            font-size: 18px; line-height: 2; color: var(--text-main); letter-spacing: 0.3px;
            transition: font-size 0.1s, line-height 0.1s;
        }
        
        /* Highlighting System - WORD LEVEL */
        .lesson-paragraph { margin-bottom: 15px; display: block; }
        .selectable-word {
            display: inline;
            border-radius: 4px;
            transition: background-color 0.2s ease;
            cursor: pointer;
            padding: 2px 0;
            border-bottom: 2px solid transparent;
        }
        .selectable-word.selected { 
            background-color: rgba(120, 120, 120, 0.2); 
            border-bottom: 2px dashed var(--md-sys-color-primary); 
        }
        
        .lesson-content img { width: 100%; border-radius: 12px; margin: 20px 0; pointer-events: none; }

        /* Modern Action Menu */
        .action-menu {
            position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(150px);
            background: #202124; color: #fff;
            padding: 10px 14px; border-radius: 40px; display: flex; gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            align-items: center;
        }
        .action-menu.show { transform: translateX(-50%) translateY(0); }
        .action-btn { background: none; border: none; color: inherit; font-size: 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 0 4px;}
        .action-btn span { font-size: 10px; font-family: 'Noto Sans Ethiopic'; font-weight: bold;}
        .action-divider { width: 1px; background: rgba(255,255,255,0.2); height: 30px; margin: 0 4px;}
        
        /* Color Picker for Highlighting */
        .color-picker-container { display: flex; gap: 8px; align-items: center; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;}
        .color-dot:active { transform: scale(0.8); }

        /* Floating Feedback Button */
        .feedback-fab {
            position: fixed; right: 16px; bottom: calc(90px + var(--safe-bottom));
            background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            z-index: 1000; cursor: pointer; border: none; transition: transform 0.2s, background 0.3s;
        }
        .feedback-fab:active { transform: scale(0.9); }

        /* Bottom Sheet */
        .bottom-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; display: none; opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(3px); }
        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%; box-sizing: border-box;
            background: var(--surface); border-radius: 28px 28px 0 0;
            padding: 24px; box-shadow: 0 -10px 25px rgba(0,0,0,0.2);
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 3001; border-top: 1px solid var(--border);
        }
        .bottom-sheet.open { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 5px; background: var(--border); border-radius: 3px; margin: 0 auto 24px; }
        
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .settings-label { font-weight: 700; font-size: 15px; }
        
        .font-controls { display: flex; gap: 15px; background: var(--bg); padding: 5px; border-radius: 15px; border: 1px solid var(--border); }
        .font-btn { width: 45px; height: 45px; border: none; background: transparent; color: var(--text-main); font-size: 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .bg-options-grid { display: flex; gap: 12px; justify-content: center; }
        .bg-option-card {
            flex: 1; padding: 15px 0; border-radius: 16px; border: 2px solid transparent;
            display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: 700; font-size: 13px; cursor: pointer;
        }
        .bg-option-card.active { border-color: var(--md-sys-color-primary); transform: scale(1.05); }

        /* CUSTOM APP ALERT / MODAL */
        .custom-alert-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(4px);
        }
        .custom-alert-overlay.show { opacity: 1; visibility: visible; }
        .custom-alert-box {
            background: var(--surface); color: var(--text-main); width: 85%; max-width: 340px;
            border-radius: 20px; padding: 24px; text-align: center;
            transform: scale(0.9); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 1px solid var(--border);
        }
        .custom-alert-overlay.show .custom-alert-box { transform: scale(1); }
        .custom-alert-header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 16px; }
        .custom-alert-header i { font-size: 36px; color: var(--md-sys-color-primary); }
        .custom-alert-header h3 { margin: 0; font-size: 18px; font-weight: bold; }
        .custom-alert-body { font-size: 15px; margin-bottom: 24px; color: var(--text-sub); line-height: 1.5; word-wrap: break-word; }
        .custom-alert-btn {
            background: var(--text-main); color: var(--bg); border: none; padding: 12px 0;
            width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; font-family: 'Noto Sans Ethiopic'; margin-bottom: 8px;
        }
        .btn-secondary { background: var(--border); color: var(--text-main); }
        
        /* Form Inputs */
        textarea.custom-input {
            width: 100%; height: 90px; box-sizing: border-box; padding: 10px;
            border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main);
            font-family: inherit; font-size: 14px; resize: none; margin-bottom: 15px; outline: none;
        }
        textarea.custom-input:focus { border-color: var(--md-sys-color-primary); }

        .skeleton-text { height: 16px; background: var(--border); margin-bottom: 14px; border-radius: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body> 

    <header id="app-header">
        <button class="icon-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <h2 class="header-title" id="header-title-text">ትምህርት</h2>
        <div class="header-actions">
            <button class="icon-btn" onclick="shareFullLesson()"><i class="fas fa-share-nodes"></i></button>
            <button class="icon-btn" onclick="openBottomSheet()"><i class="fas fa-sliders-h"></i></button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="readingProgress"></div></div>
    </header>

    <div class="scroll-container" id="main-scroll">
        <div class="lesson-cover-wrap" id="lesson-cover-wrap">
            <img src="" id="lesson-cover-img" alt="Cover">
            <div class="cover-gradient"></div>
        </div>

        <div class="lesson-text-area" id="lesson-paper">
            <div class="lesson-header">
                <h1 id="lesson-title">ማውረድ ላይ...</h1>
                <div class="lesson-meta">
                    <i class="fas fa-clock"></i> <span id="lesson-date">እየተጫነ ነው...</span>
                </div>
            </div>

            <div class="lesson-content" id="lesson-content">
                <div class="skeleton-text" style="width: 100%;"></div>
                <div class="skeleton-text" style="width: 90%;"></div>
                <div class="skeleton-text" style="width: 95%;"></div>
                <div class="skeleton-text" style="width: 80%;"></div>
            </div>
        </div>
    </div>

    <!-- Feedback FAB Button -->
    <button class="feedback-fab" onclick="openFeedbackModal()">
        <i class="fas fa-comment-dots"></i>
    </button>

    <!-- Action Menu for Highlight & Share -->
    <div class="action-menu" id="action-menu">
        <div class="color-picker-container">
            <!-- Colors like Bible apps -->
            <div class="color-dot" style="background: rgba(255, 215, 0, 0.4);" onclick="applyHighlight('rgba(255, 215, 0, 0.4)')"></div>
            <div class="color-dot" style="background: rgba(255, 126, 185, 0.4);" onclick="applyHighlight('rgba(255, 126, 185, 0.4)')"></div>
            <div class="color-dot" style="background: rgba(122, 252, 255, 0.4);" onclick="applyHighlight('rgba(122, 252, 255, 0.4)')"></div>
            <div class="color-dot" style="background: rgba(184, 242, 139, 0.4);" onclick="applyHighlight('rgba(184, 242, 139, 0.4)')"></div>
        </div>
        
        <div class="action-divider"></div>

        <button class="action-btn" onclick="copySelectedText()">
            <i class="fas fa-copy"></i><span>ኮፒ</span>
        </button>
        <button class="action-btn" onclick="shareSelected()">
            <i class="fas fa-share"></i><span>አጋራ</span>
        </button>
        <button class="action-btn" onclick="clearHighlight()">
            <i class="fas fa-eraser"></i><span>አጥፋ</span>
        </button>
    </div>

    <!-- Bottom Sheet -->
    <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="closeBottomSheet()"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="settings-row">
            <span class="settings-label">የጽሁፍ መጠን (በሁለት ጣት ማጉላትም ይቻላል)</span>
            <div class="font-controls">
                <button class="font-btn" onclick="changeFontSize(-2)">A-</button>
                <button class="font-btn" onclick="changeFontSize(2)">A+</button>
            </div>
        </div>
        <div class="settings-row" style="margin-top: 30px; margin-bottom: 10px;">
            <span class="settings-label">የማንበቢያ ገጽታ</span>
        </div>
        <div class="bg-options-grid">
            <div class="bg-option-card" id="theme-white" style="background: #ffffff; color: #000; border: 1px solid #ddd;" onclick="setReadingBg('bg-white')">
                <i class="fas fa-sun" style="font-size: 20px;"></i> ቀን
            </div>
            <div class="bg-option-card" id="theme-sepia" style="background: #fbf0d9; color: #5b4636; border: 1px solid #e6dac3;" onclick="setReadingBg('bg-sepia')">
                <i class="fas fa-book-open" style="font-size: 20px;"></i> ወረቀት
            </div>
            <div class="bg-option-card" id="theme-black" style="background: #111111; color: #fff; border: 1px solid #333;" onclick="setReadingBg('bg-black')">
                <i class="fas fa-moon" style="font-size: 20px;"></i> ማታ
            </div>
        </div>
    </div>

    <!-- CUSTOM APP ALERT -->
    <div class="custom-alert-overlay" id="appCustomAlert">
        <div class="custom-alert-box">
            <div class="custom-alert-header">
                <i class="fas fa-info-circle"></i> 
                <h3>EA Youth Union</h3>
            </div>
            <div class="custom-alert-body" id="customAlertText">
                መልክት እዚህ ይገባል።
            </div>
            <button class="custom-alert-btn" onclick="closeCustomAlert()">እሺ (OK)</button>
        </div>
    </div>

    <!-- FEEDBACK MODAL -->
    <div class="custom-alert-overlay" id="feedbackModal">
        <div class="custom-alert-box">
            <div class="custom-alert-header">
                <i class="fas fa-envelope-open-text"></i> 
                <h3>ለአድሚን ሀሳብ ይላኩ</h3>
            </div>
            <textarea class="custom-input" id="feedbackInput" placeholder="ያልዎትን ሀሳብ ወይም ጥያቄ እዚህ ይፃፉ..."></textarea>
            <button class="custom-alert-btn" onclick="sendFeedback()">ላክ (Send)</button>
            <button class="custom-alert-btn btn-secondary" onclick="closeFeedbackModal()">ተመለስ (Cancel)</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBERVjtc0sX_douQdDRL8amgLkbf9Rnvqs",
            authDomain: "ea-youth-union-d22b1.firebaseapp.com",
            databaseURL: "https://ea-youth-union-d22b1-default-rtdb.firebaseio.com",
            projectId: "ea-youth-union-d22b1",
            storageBucket: "ea-youth-union-d22b1.firebasestorage.app"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const scroller = document.getElementById('main-scroll');
        const header = document.getElementById('app-header');
        const contentArea = document.getElementById('lesson-content');
        let currentLessonData = null;
        let activeLessonId = new URLSearchParams(window.location.search).get('id') || 'current';

        // Custom App Alert
        function appAlert(message) {
            document.getElementById('customAlertText').innerText = message;
            document.getElementById('appCustomAlert').classList.add('show');
        }
        function closeCustomAlert() {
            document.getElementById('appCustomAlert').classList.remove('show');
        }

        // Feedback Modal Logic
        function openFeedbackModal() {
            document.getElementById('feedbackModal').classList.add('show');
        }
        function closeFeedbackModal() {
            document.getElementById('feedbackModal').classList.remove('show');
        }
        function sendFeedback() {
            const text = document.getElementById('feedbackInput').value.trim();
            if(!text) {
                appAlert("እባክዎ ሀሳቦን ይፃፉ!");
                return;
            }
            
            db.ref('Feedback').push({
                lessonId: activeLessonId,
                lessonTitle: currentLessonData ? currentLessonData.title : 'Unknown',
                message: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('feedbackInput').value = '';
                closeFeedbackModal();
                appAlert("ሀሳቦት በተሳካ ሁኔታ ተልኳል! እናመሰግናለን።");
            }).catch(err => {
                appAlert("ማስተላለፍ አልተቻለም። የኢንተርኔት ግንኙነትዎን ያረጋግጡ።");
            });
        }

        function goBack() { window.history.back(); setTimeout(() => window.location.href = 'home.html', 300); }

        // --- Scrolling & Progress ---
        let lastScrollTop = 0;
        scroller.addEventListener("scroll", function() {
            let st = scroller.scrollTop;
            if (st > 60 && st > lastScrollTop) header.classList.add("hide-header");
            else header.classList.remove("hide-header");
            lastScrollTop = st <= 0 ? 0 : st;

            let scrollHeight = scroller.scrollHeight - scroller.clientHeight;
            let scrolled = (scrollHeight > 0) ? (st / scrollHeight) * 100 : 0;
            document.getElementById("readingProgress").style.width = scrolled + "%";
        });

        // --- Settings Management ---
        function openBottomSheet() {
            document.getElementById('sheet-overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('sheet-overlay').style.opacity = '1';
                document.getElementById('bottom-sheet').classList.add('open');
            }, 10);
        }

        function closeBottomSheet() {
            document.getElementById('bottom-sheet').classList.remove('open');
            document.getElementById('sheet-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('sheet-overlay').style.display = 'none', 300);
        }

        let currentFontSize = parseInt(localStorage.getItem('ea_font_size')) || 18;
        function updateFontDisplay() {
            contentArea.style.fontSize = currentFontSize + 'px';
            contentArea.style.lineHeight = (currentFontSize * 1.8) + 'px';
        }
        function changeFontSize(change) {
            currentFontSize += change;
            if (currentFontSize < 14) currentFontSize = 14;
            if (currentFontSize > 36) currentFontSize = 36;
            localStorage.setItem('ea_font_size', currentFontSize);
            updateFontDisplay();
        }

        function setReadingBg(themeClass) {
            document.body.classList.remove('bg-white', 'bg-sepia', 'bg-black', 'dark-mode');
            if (themeClass === 'bg-black') document.body.classList.add('dark-mode', 'bg-black');
            else document.body.classList.add(themeClass);

            document.querySelectorAll('.bg-option-card').forEach(c => c.classList.remove('active'));
            if(document.getElementById(`theme-${themeClass.split('-')[1]}`)) {
                document.getElementById(`theme-${themeClass.split('-')[1]}`).classList.add('active');
            }
            localStorage.setItem('ea_reading_theme', themeClass);
            setTimeout(closeBottomSheet, 200);
        }

        // --- PINCH TO ZOOM LOGIC ---
        let initialPinchDistance = null;
        contentArea.addEventListener('touchstart', (e) => {
            if(e.touches.length === 2) {
                e.preventDefault();
                initialPinchDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }
        }, {passive: false});

        contentArea.addEventListener('touchmove', (e) => {
            if(e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault();
                let currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                let diff = currentDistance - initialPinchDistance;
                if (Math.abs(diff) > 15) {
                    let change = diff > 0 ? 1 : -1;
                    changeFontSize(change);
                    initialPinchDistance = currentDistance; 
                }
            }
        }, {passive: false});

        contentArea.addEventListener('touchend', (e) => {
            if(e.touches.length < 2) initialPinchDistance = null;
        });


        // --- WORD-LEVEL HIGHLIGHTING SYSTEM (SWIPE TO SELECT) ---
        let selectedBlocks = [];
        const actionMenu = document.getElementById('action-menu');
        let blockNextClick = false; // Prevents click after dragging

        function toggleWordSelection(wordElement, forceSelect = null) {
            if (blockNextClick && forceSelect === null) return; // Prevent deselecting right after swipe

            const wordId = wordElement.getAttribute('data-id');
            const isCurrentlySelected = wordElement.classList.contains('selected');
            
            // Logic to handle forced selections (during swipe)
            if (forceSelect === true && isCurrentlySelected) return;
            if (forceSelect === false && !isCurrentlySelected) return;

            if (isCurrentlySelected && forceSelect !== true) {
                wordElement.classList.remove('selected');
                selectedBlocks = selectedBlocks.filter(id => id !== wordId);
            } else {
                wordElement.classList.add('selected');
                if(!selectedBlocks.includes(wordId)) selectedBlocks.push(wordId);
            }

            if (selectedBlocks.length > 0) actionMenu.classList.add('show');
            else actionMenu.classList.remove('show');
        }

        // --- SWIPE (DRAG) TO SELECT LISTENER ---
        let isSwipingToSelect = false;
        let touchTimer = null;

        contentArea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1 && e.target.classList.contains('selectable-word')) {
                // Wait for 300ms to detect if it's a scroll or a text selection attempt
                touchTimer = setTimeout(() => {
                    isSwipingToSelect = true;
                    toggleWordSelection(e.target, true);
                    if(navigator.vibrate) navigator.vibrate(50); // Small vibration feedback
                }, 300); 
            }
        }, { passive: false });

        contentArea.addEventListener('touchmove', (e) => {
            if (isSwipingToSelect) {
                e.preventDefault(); // Stop standard scrolling while we highlight text
                let touch = e.touches[0];
                let elem = document.elementFromPoint(touch.clientX, touch.clientY);
                if (elem && elem.classList.contains('selectable-word')) {
                    toggleWordSelection(elem, true); // Force select on dragged words
                }
            } else {
                clearTimeout(touchTimer); // If finger moved before 300ms, it's just a regular scroll
            }
        }, { passive: false });

        contentArea.addEventListener('touchend', (e) => {
            clearTimeout(touchTimer);
            if (isSwipingToSelect) {
                isSwipingToSelect = false;
                // Block the default `onclick` from firing so it doesn't unselect the last word
                blockNextClick = true;
                setTimeout(() => blockNextClick = false, 100);
            }
        });

        // --- SAVE & LOAD HIGHLIGHTS ---
        function saveHighlights() {
            let saved = JSON.parse(localStorage.getItem('ea_highlights_v3') || '{}');
            let currentHighlights = [];
            document.querySelectorAll('.selectable-word').forEach(el => {
                if(el.style.backgroundColor) {
                    currentHighlights.push({
                        id: el.getAttribute('data-id'),
                        color: el.style.backgroundColor
                    });
                }
            });
            saved[activeLessonId] = currentHighlights;
            localStorage.setItem('ea_highlights_v3', JSON.stringify(saved));
        }

        function loadHighlights() {
            let saved = JSON.parse(localStorage.getItem('ea_highlights_v3') || '{}');
            let myHighlights = saved[activeLessonId] || [];
            myHighlights.forEach(h => {
                let el = document.querySelector(`.selectable-word[data-id="${h.id}"]`);
                if(el) {
                    el.style.backgroundColor = h.color;
                    el.classList.add('highlighted');
                }
            });
        }

        function applyHighlight(colorHex) {
            selectedBlocks.forEach(id => {
                let el = document.querySelector(`.selectable-word[data-id="${id}"]`);
                if(el) { 
                    el.style.backgroundColor = colorHex; 
                    el.classList.add('highlighted'); 
                    el.classList.remove('selected'); 
                }
            });
            selectedBlocks = [];
            actionMenu.classList.remove('show');
            saveHighlights();
        }

        function clearHighlight() {
            selectedBlocks.forEach(id => {
                let el = document.querySelector(`.selectable-word[data-id="${id}"]`);
                if(el) { 
                    el.style.backgroundColor = ''; 
                    el.classList.remove('highlighted', 'selected'); 
                }
            });
            selectedBlocks = [];
            actionMenu.classList.remove('show');
            saveHighlights();
        }

        function clearSelectionStateOnly() {
            document.querySelectorAll('.selectable-word.selected').forEach(el => el.classList.remove('selected'));
            selectedBlocks = [];
            actionMenu.classList.remove('show');
        }

        scroller.addEventListener('click', (e) => {
            if(!e.target.closest('.selectable-word') && !e.target.closest('.action-menu')) {
                clearSelectionStateOnly();
            }
        });

        // --- SHARE & COPY LOGIC ---
        function generateShareLink() {
            // Web App URL that works as a real searchable link across the internet
            let base = "https://eayouthunion.web.app/lesson.html";
            return `${base}?id=${activeLessonId}`;
        }

        function shareFullLesson() {
            if(!currentLessonData) return;
            const link = generateShareLink();
            const shareText = `📚 ${currentLessonData.title}\n\nሙሉ ትምህርቱን ለማንበብ ይህንን ሊንክ ይጫኑ:\n${link}`;
            
            if(navigator.clipboard) navigator.clipboard.writeText(shareText).catch(e=>console.log(e));

            if (navigator.share) {
                navigator.share({ title: currentLessonData.title, text: shareText, url: link }).catch(err => console.log(err));
            } else {
                appAlert("የፅሁፉ ሊንክ ኮፒ ተደርጓል! በቀጥታ ለሌሎች መላክ (Paste) ይችላሉ።\n\n" + link);
            }
        }

        function getSelectedTextCompiled() {
            if(selectedBlocks.length === 0) return "";
            let sortedBlocks = [...selectedBlocks].sort((a,b) => {
                let [pa, wa] = a.split('_').map(Number);
                let [pb, wb] = b.split('_').map(Number);
                if(pa !== pb) return pa - pb;
                return wa - wb;
            });
            let selectedText = [];
            sortedBlocks.forEach(id => {
                let el = document.querySelector(`.selectable-word[data-id="${id}"]`);
                if(el) selectedText.push(el.innerText.trim());
            });
            return selectedText.join(' ');
        }

        function copySelectedText() {
            const rawText = getSelectedTextCompiled();
            if(!rawText) return;
            
            const link = generateShareLink();
            const fullText = `"${rawText}"\n\n- ከ "${currentLessonData.title}"\nሙሉውን ለማንበብ: ${link}`;
            
            if(navigator.clipboard) {
                navigator.clipboard.writeText(fullText).then(() => {
                    appAlert("ፅሁፉ እና ሊንኩ በተሳካ ሁኔታ ኮፒ ተደርጓል!");
                    clearSelectionStateOnly();
                }).catch(err => {
                    appAlert("ኮፒ ማድረግ አልተቻለም።");
                });
            } else {
                appAlert("ስልክዎ ኮፒ ማድረግን (Clipboard) አይደግፍም።");
            }
        }

        function shareSelected() {
            const rawText = getSelectedTextCompiled();
            if(!rawText) return;
            
            const link = generateShareLink();
            const shareText = `"${rawText}"\n\n- ከ "${currentLessonData.title}"\nሙሉውን ለማንበብ: ${link}`;
            
            if(navigator.clipboard) navigator.clipboard.writeText(shareText).catch(e=>console.log(e));
            
            if (navigator.share) {
                navigator.share({ title: currentLessonData.title, text: shareText })
                .then(() => { clearSelectionStateOnly(); })
                .catch(err => console.log(err));
            } else {
                appAlert("ፅሁፉ እና ሊንኩ ኮፒ ተደርጓል! (Paste) በማድረግ ይላኩ።");
                clearSelectionStateOnly();
            }
        }

        // --- DATA FETCHING & PARSING ---
        function fetchLessonData() {
            if (activeLessonId && activeLessonId !== 'current') {
                db.ref(`LessonHistory/${activeLessonId}`).once('value').then(snap => {
                    if (snap.exists()) renderLesson(snap.val()); else renderError();
                }).catch(renderError);
            } else {
                db.ref('HomeLesson').on('value', snap => {
                    if (snap.exists()) renderLesson(snap.val()); else renderError();
                });
            }
        }

        function renderLesson(data) {
            currentLessonData = data;
            document.getElementById('header-title-text').innerText = data.title || "ትምህርት";
            document.getElementById('lesson-title').innerText = data.title || "ያልተሰየመ ትምህርት";
            
            let dateStr = "የዛሬ ትምህርት";
            if (data.timestamp) {
                const d = new Date(data.timestamp);
                dateStr = d.toLocaleDateString('am-ET', { year: 'numeric', month: 'long', day: 'numeric' });
            }
            document.getElementById('lesson-date').innerText = dateStr;
            
            const coverWrap = document.getElementById('lesson-cover-wrap');
            if (data.image && data.image.trim() !== '') {
                document.getElementById('lesson-cover-img').src = data.image;
                coverWrap.style.display = 'block';
                document.getElementById('lesson-paper').classList.remove('has-cover');
            } else {
                coverWrap.style.display = 'none';
                document.getElementById('lesson-paper').classList.add('has-cover');
            }

            let textContent = data.description || data.content || "ምንም ማብራሪያ የለውም...";
            let rawParagraphs = textContent.replace(/<p>/g, '').split(/<\/p>|\n+/);
            
            // Wrapping every single word for Word-Level Selection
            let wrappedContent = rawParagraphs.map((para, pIndex) => {
                let text = para.trim();
                if(text && !text.includes('<img')) {
                    // Split by spaces and wrap each word
                    let wordsHTML = text.split(/\s+/).map((word, wIndex) => {
                        return `<span class="selectable-word" data-id="${pIndex}_${wIndex}" onclick="toggleWordSelection(this)">${word} </span>`;
                    }).join('');
                    return `<p class="lesson-paragraph">${wordsHTML}</p>`;
                } else if (text.includes('<img')) {
                    return `<div style="pointer-events:none;">${text}</div>`;
                }
                return '';
            }).join('');
            
            contentArea.innerHTML = wrappedContent;
            setTimeout(loadHighlights, 100);
        }

        function renderError() {
            document.getElementById('lesson-title').innerText = "መረጃ አልተገኘም";
            contentArea.innerHTML = "<p style='color:red; text-align:center;'>ይህ ትምህርት ተሰርዟል ወይም የኢንተርኔት ችግር አለ።</p>";
        }

        window.onload = () => {
            updateFontDisplay();
            setReadingBg(localStorage.getItem('ea_reading_theme') || 'bg-white');
            fetchLessonData();
        };
    </script>
</body>
</html>
