<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EA Youth Union - Live Stream</title>
    
    <meta name="theme-color" content="#ffd700" id="theme-meta">
    
    <link rel="stylesheet" href="nav.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+Ethiopic:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffd700;           
            --primary-dark: #b8860b;
            --danger: #ff4757;            
            --bg: #f4f6f8;
            --surface: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #636e72;
            --border: rgba(0,0,0,0.05);
            
            --shadow-3d: 0 15px 35px -5px rgba(0,0,0,0.1), 0 10px 15px -5px rgba(0,0,0,0.05);
            --shadow-inset: inset 0 2px 5px rgba(255, 255, 255, 0.8), inset 0 -3px 5px rgba(0, 0, 0, 0.05);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body.dark-mode {
            --bg: #0a0a0c;
            --surface: #161618;
            --text-main: #e0e0e0;
            --text-sub: #888888;
            --border: rgba(255,255,255,0.08);
            --shadow-3d: 0 15px 35px -5px rgba(0,0,0,0.6), 0 10px 15px -5px rgba(0,0,0,0.4);
            --shadow-inset: inset 0 2px 5px rgba(255, 255, 255, 0.05), inset 0 -3px 5px rgba(0, 0, 0, 0.3);
        }

        body.sabbath-mode {
            --primary: #00f3ff; 
            --primary-dark: #008eb3;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg); color: var(--text-main);
            padding-bottom: calc(90px + var(--safe-bottom)); 
            overflow-x: hidden;
        }

        header {
            padding: calc(15px + var(--safe-top)) 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        .header-title { font-size: 20px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        .live-badge { background: var(--danger); color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; animation: pulse 1.5s infinite; }
        .offline-badge { background: var(--text-sub); color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; display: none; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* ======== Player Section ======== */
        .player-wrapper {
            position: relative; width: 100%; background: #000; z-index: 50;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-3d);
        }
        
        .player-wrapper.expanded {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 200000; display: flex; flex-direction: column; justify-content: center;
        }

        .video-container {
            position: relative; padding-bottom: 56.25%; 
            height: 0; overflow: hidden; width: 100%;
        }

        .player-wrapper.expanded .video-container {
            padding-bottom: 0; height: 100%; max-height: 100vh;
        }

        .video-container iframe, .video-container video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        .player-controls {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
        }
        
        .control-btn {
            background: var(--border); color: var(--text-main); border: none;
            padding: 8px 15px; border-radius: 12px; font-weight: 700; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .control-btn:active { transform: scale(0.95); }
        .control-btn.record-active { background: var(--danger); color: #fff; animation: pulse 1s infinite; }
        .control-btn.books-btn { background: rgba(0, 243, 255, 0.1); color: #008eb3; }
        body.dark-mode .control-btn.books-btn { color: #00f3ff; }

        /* ======== Tabs & Content ======== */
        .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { flex: 1; min-width: 80px; text-align: center; padding: 15px 10px; font-weight: 800; color: var(--text-sub); cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-content { display: none; padding: 15px 20px; }
        .tab-content.active { display: block; }

        /* ======== Comments ======== */
        .chat-container { display: flex; flex-direction: column; height: 400px; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
        .message { background: var(--surface); padding: 10px 15px; border-radius: 16px; border: 1px solid var(--border); max-width: 85%; align-self: flex-start; }
        .message.mine { align-self: flex-end; background: var(--primary-dark); color: #fff; border: none; }
        .msg-name { font-size: 10px; font-weight: bold; margin-bottom: 3px; opacity: 0.8; }
        .msg-text { font-size: 13px; line-height: 1.4; }

        .chat-input-area { display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .chat-input { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 12px 15px; border-radius: 20px; color: var(--text-main); font-family: inherit; }
        .chat-send { background: var(--primary); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px var(--primary-glow); }

        /* ======== VOD & Schedule ======== */
        .vod-card, .schedule-card {
            background: var(--surface); border-radius: 16px; padding: 15px; margin-bottom: 12px;
            border: 1px solid var(--border); display: flex; gap: 15px; align-items: center;
            box-shadow: var(--shadow-3d); cursor: pointer;
        }
        .vod-thumb { width: 80px; height: 60px; background: var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--primary); }
        .vod-info h4 { margin: 0 0 5px; font-size: 14px; font-weight: bold; }
        .vod-info p { margin: 0; font-size: 11px; color: var(--text-sub); }

        /* ======== SDA Books Grid ======== */
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .book-card { background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-3d); text-decoration: none; color: var(--text-main); display: flex; flex-direction: column; transition: 0.3s; }
        .book-card:active { transform: scale(0.96); }
        .book-cover { width: 100%; height: 180px; background-color: var(--border); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: var(--text-sub); font-size: 30px; }
        .book-info { padding: 10px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .book-title { font-size: 13px; font-weight: bold; margin: 0 0 5px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .book-author { font-size: 11px; color: var(--text-sub); margin: 0; }
        .book-btn { margin-top: 8px; background: var(--primary); color: #000; border: none; padding: 6px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }

        /* ======== Admin Panel ======== */
        .admin-panel { display: none; background: rgba(255, 71, 87, 0.05); border: 1px solid var(--danger); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .admin-panel h3 { color: var(--danger); margin: 0 0 15px; font-size: 15px; display: flex; align-items: center; gap: 8px;}
        .admin-section { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .admin-section h4 { margin: 0 0 10px; font-size: 13px; color: var(--text-main); }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); font-family: inherit; }
        .admin-btn { width: 100%; padding: 12px; background: var(--danger); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .admin-btn.blue { background: #008eb3; }
        
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <i class="fas fa-broadcast-tower" style="color: var(--primary);"></i> ቀጥታ ስርጭት
            <span class="live-badge" id="live-indicator" style="display:none;">LIVE</span>
            <span class="offline-badge" id="offline-indicator" style="display:none;"><i class="fas fa-wifi"></i> Offline</span>
        </div>
        <div style="font-size: 20px; cursor:pointer;" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></div>
    </header>

    <!-- Admin Panel (Shown only to Admins) -->
    <div class="admin-panel" id="admin-panel">
        <h3><i class="fas fa-user-shield"></i> Admin Dashboard</h3>
        
        <!-- Live Stream Control -->
        <div class="admin-section">
            <h4><i class="fas fa-video"></i> ስርጭት መቆጣጠሪያ</h4>
            <select id="stream-type" class="admin-input">
                <option value="youtube">YouTube Link (Auto Embeds)</option>
                <option value="telegram">Telegram Web Link</option>
            </select>
            <input type="text" id="stream-url" class="admin-input" placeholder="YouTube/Telegram ሊንክ ያስገቡ">
            <input type="text" id="stream-title" class="admin-input" placeholder="የፕሮግራሙ ርዕስ">
            <button class="admin-btn" onclick="updateLiveStream()">ስርጭቱን ጀምር / ቀይር</button>
            <hr style="border-color: var(--border); margin: 15px 0;">
            <button class="admin-btn" style="background: var(--text-sub);" onclick="saveToVOD()">ወደ ሪከርድ መዝገብ አስገባ (End & Save)</button>
        </div>

        <!-- Books Upload Control -->
        <div class="admin-section">
            <h4><i class="fas fa-book"></i> መጽሐፍ ማስገቢያ (SDA Books)</h4>
            <input type="text" id="book-title" class="admin-input" placeholder="የመጽሐፉ ርዕስ">
            <input type="text" id="book-author" class="admin-input" placeholder="የጸሐፊው ስም">
            <input type="text" id="book-cover" class="admin-input" placeholder="የሽፋን ምስል ሊንክ (Cover Image URL)">
            <input type="text" id="book-link" class="admin-input" placeholder="የመጽሐፉ ማውረጃ ሊንክ (PDF/Drive Link)">
            <button class="admin-btn blue" onclick="addNewBook()">መጽሐፉን ለህዝብ ልቀቅ</button>
        </div>
    </div>

    <!-- Live Player Section -->
    <div class="player-wrapper" id="player-wrapper">
        <div class="video-container" id="video-container">
            <iframe id="live-frame" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            <div id="offline-msg" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #111; color: #fff; font-weight: bold;">
                <div style="text-align: center;">
                    <i class="fas fa-tv" style="font-size: 30px; margin-bottom: 10px; color: var(--text-sub);"></i><br>
                    በአሁን ሰዓት ቀጥታ ስርጭት የለም
                </div>
            </div>
        </div>
        <div class="player-controls">
            <h4 id="current-title" style="margin:0; font-size:14px; font-weight:800; max-width: 50%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">EA Live Stream</h4>
            <div style="display: flex; gap: 8px;">
                <button class="control-btn books-btn" onclick="switchTab('books')"><i class="fas fa-book-open"></i> መጻሕፍት</button>
                <button class="control-btn" id="record-btn" onclick="toggleRecord()"><i class="fas fa-record-vinyl"></i></button>
                <button class="control-btn" onclick="toggleExpand()"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('chat')">ውይይት</div>
        <div class="tab" onclick="switchTab('vod')">ያለፉ (VOD)</div>
        <div class="tab" onclick="switchTab('books')">መጻሕፍት</div>
        <div class="tab" onclick="switchTab('schedule')">መርሐግብር</div>
    </div>

    <!-- Tab: Chat -->
    <div class="tab-content active" id="tab-chat">
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages load here -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-msg-in" class="chat-input" placeholder="ሀሳብዎን ይፃፉ...">
                <button class="chat-send" onclick="sendComment()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Tab: VOD (Past Streams) -->
    <div class="tab-content" id="tab-vod">
        <div id="vod-list">
            <!-- VOD items load here -->
        </div>
    </div>

    <!-- Tab: SDA Books -->
    <div class="tab-content" id="tab-books">
        <div class="books-grid" id="books-list">
            <!-- Books load here -->
        </div>
    </div>

    <!-- Tab: Schedule -->
    <div class="tab-content" id="tab-schedule">
        <div id="schedule-list">
            <div class="schedule-card">
                <div class="vod-thumb" style="background: rgba(0, 243, 255, 0.1);"><i class="fas fa-calendar-alt"></i></div>
                <div class="vod-info">
                    <h4>የሰንበት ፕሮግራም</h4>
                    <p>ቅዳሜ ከጠዋቱ 3፡00 ጀምሮ</p>
                </div>
            </div>
            <div class="schedule-card">
                <div class="vod-thumb" style="background: rgba(255, 215, 0, 0.1);"><i class="fas fa-calendar-alt"></i></div>
                <div class="vod-info">
                    <h4>የወጣቶች ህብረት</h4>
                    <p>እሁድ ከሰዓት 8፡00 ጀምሮ</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="nav.js"></script>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBERVjtc0sX_douQdDRL8amgLkbf9Rnvqs",
            authDomain: "ea-youth-union-d22b1.firebaseapp.com",
            databaseURL: "https://ea-youth-union-d22b1-default-rtdb.firebaseio.com",
            projectId: "ea-youth-union-d22b1",
            storageBucket: "ea-youth-union-d22b1.firebasestorage.app",
            messagingSenderId: "712139060952",
            appId: "1:712139060952:web:56553176494e3f4e8689ad"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // User Setup
        const userSession = JSON.parse(localStorage.getItem('ea_user_session')) || { name: "Guest User", phone: "000", role: "user" };
        const uid = userSession.id || userSession.phone.replace('+251', '');
        const userName = userSession.name.split(" ")[0];

        // Global Network State
        let isOnline = navigator.onLine;

        // Offline Caching Helper Functions
        function saveToCache(key, data) {
            localStorage.setItem(`ea_cache_${key}`, JSON.stringify(data));
        }
        function loadFromCache(key) {
            const cached = localStorage.getItem(`ea_cache_${key}`);
            return cached ? JSON.parse(cached) : null;
        }

        // 2. Initialization & Admin Check
        document.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('ea_theme') === 'dark') document.body.classList.add('dark-mode');
            
            if(userSession.role === 'admin' || userSession.isAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
            }

            // Detect Offline/Online Status
            window.addEventListener('online', updateNetworkStatus);
            window.addEventListener('offline', updateNetworkStatus);
            updateNetworkStatus();

            // Initial Data Load (Tries Cache first for instant load, then fetches new data)
            renderVODs(loadFromCache('vod'));
            renderBooks(loadFromCache('books'));
            
            listenToLiveStream();
            listenToComments();
            listenToVOD();
            listenToBooks();
        });

        function updateNetworkStatus() {
            isOnline = navigator.onLine;
            document.getElementById('offline-indicator').style.display = isOnline ? 'none' : 'inline-block';
            if(!isOnline) {
                // If offline, reload live state from cache so user sees the last known info
                const cachedLive = loadFromCache('live');
                if(cachedLive) applyLiveState(cachedLive);
            }
        }

        // 3. Tab Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            
            // Fix: target correct tab visually
            document.querySelectorAll('.tab').forEach(t => {
                if(t.innerText.toLowerCase().includes(tabId) || 
                   (tabId === 'chat' && t.innerText.includes('ውይይት')) ||
                   (tabId === 'vod' && t.innerText.includes('ያለፉ')) ||
                   (tabId === 'books' && t.innerText.includes('መጻሕፍት')) ||
                   (tabId === 'schedule' && t.innerText.includes('መርሐግብር'))
                ) {
                    t.classList.add('active');
                }
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        // 4. Video Expand Trick
        let isExpanded = false;
        function toggleExpand() {
            const wrapper = document.getElementById('player-wrapper');
            isExpanded = !isExpanded;
            if(isExpanded) {
                wrapper.classList.add('expanded');
                document.body.style.overflow = 'hidden';
            } else {
                wrapper.classList.remove('expanded');
                document.body.style.overflow = 'auto';
            }
        }

        // 5. In-App Screen Recording
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        async function toggleRecord() {
            const btn = document.getElementById('record-btn');
            if(!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.style.display = 'none'; a.href = url; a.download = `EA_Live_${Date.now()}.webm`;
                        document.body.appendChild(a); a.click();
                        window.URL.revokeObjectURL(url); recordedChunks = [];
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('record-active');
                    btn.innerHTML = `<i class="fas fa-stop"></i>`;
                    stream.getVideoTracks()[0].onended = () => { if(isRecording) toggleRecord(); };
                } catch (err) { alert("የስክሪን ሪኮርድ ለማድረግ ፍቃድ ያስፈልጋል!"); }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('record-active');
                btn.innerHTML = `<i class="fas fa-record-vinyl"></i>`;
            }
        }

        // 6. Smart Admin Link Formatter
        function formatEmbedUrl(url) {
            if(url.includes('youtube.com/watch?v=')) {
                return url.replace('watch?v=', 'embed/').split('&')[0];
            } else if(url.includes('youtu.be/')) {
                return url.replace('youtu.be/', 'youtube.com/embed/').split('?')[0];
            }
            return url; // Return as is if it's already embed or telegram
        }

        // 7. Admin Actions: Live Stream
        function updateLiveStream() {
            const type = document.getElementById('stream-type').value;
            let url = document.getElementById('stream-url').value.trim();
            const title = document.getElementById('stream-title').value.trim() || "EA Live Stream";

            if(!url) return alert("እባክዎ ሊንክ ያስገቡ!");
            
            if(type === 'youtube') url = formatEmbedUrl(url);

            db.ref('LiveConfig').set({
                isActive: true,
                type: type,
                url: url,
                title: title,
                timestamp: Date.now()
            }).then(() => {
                alert("ስርጭቱ በተሳካ ሁኔታ ተጀምሯል!");
                document.getElementById('stream-url').value = '';
            }).catch(e => alert("Error: " + e.message));
        }

        let currentStreamData = null;
        function saveToVOD() {
            if(!currentStreamData || !currentStreamData.url) return alert("የሚያስቀምጡት ስርጭት የለም!");
            
            db.ref('VOD').push({
                title: currentStreamData.title,
                url: currentStreamData.url,
                type: currentStreamData.type,
                date: new Date().toLocaleDateString('am-ET')
            }).then(() => {
                db.ref('LiveConfig').update({ isActive: false });
                alert("ወደ ሪከርድ ተቀምጧል! ላይቭ ተቋርጧል።");
            });
        }

        // 8. Admin Actions: Books
        function addNewBook() {
            const title = document.getElementById('book-title').value.trim();
            const author = document.getElementById('book-author').value.trim() || "EA Youth";
            const cover = document.getElementById('book-cover').value.trim();
            const link = document.getElementById('book-link').value.trim();

            if(!title || !link) return alert("የርዕስ እና የማውረጃ ሊንክ መግባት ግዴታ ነው!");

            db.ref('Books').push({
                title: title,
                author: author,
                cover: cover,
                link: link,
                timestamp: Date.now()
            }).then(() => {
                alert("መጽሐፉ በተሳካ ሁኔታ ተጨምሯል!");
                document.getElementById('book-title').value = '';
                document.getElementById('book-author').value = '';
                document.getElementById('book-cover').value = '';
                document.getElementById('book-link').value = '';
            });
        }

        // 9. Data Listeners & Caching (Live, VOD, Books)
        function listenToLiveStream() {
            db.ref('LiveConfig').on('value', snap => {
                const data = snap.val();
                saveToCache('live', data);
                applyLiveState(data);
            });
        }

        function applyLiveState(data) {
            currentStreamData = data;
            const iframe = document.getElementById('live-frame');
            const offlineMsg = document.getElementById('offline-msg');
            const indicator = document.getElementById('live-indicator');
            
            if(data && data.isActive && isOnline) {
                if(iframe.src !== data.url) iframe.src = data.url;
                iframe.style.display = 'block';
                offlineMsg.style.display = 'none';
                indicator.style.display = 'inline-block';
                document.getElementById('current-title').innerText = data.title;
            } else {
                iframe.src = '';
                iframe.style.display = 'none';
                offlineMsg.style.display = 'flex';
                indicator.style.display = 'none';
                document.getElementById('current-title').innerText = isOnline ? "ከመስመር ውጪ (Offline)" : "No Internet Connection";
            }
        }

        function listenToVOD() {
            db.ref('VOD').limitToLast(20).on('value', snap => {
                const data = snap.val();
                saveToCache('vod', data);
                renderVODs(data);
            });
        }

        function renderVODs(data) {
            const list = document.getElementById('vod-list');
            list.innerHTML = '';
            if(data) {
                Object.values(data).reverse().forEach(v => {
                    list.innerHTML += `
                        <div class="vod-card" onclick="playVOD('${v.url}', '${v.title.replace(/'/g, "\\'")}')">
                            <div class="vod-thumb"><i class="fas fa-play-circle"></i></div>
                            <div class="vod-info">
                                <h4>${v.title}</h4>
                                <p>${v.date} - ${v.type}</p>
                            </div>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = `<p style="text-align:center; color:var(--text-sub); padding: 20px;">ምንም የተቀረጸ ቪዲዮ የለም።</p>`;
            }
        }

        function playVOD(url, title) {
            if(!isOnline) return alert("ቪዲዮ ለማጫወት ኢንተርኔት ያስፈልጋል!");
            const iframe = document.getElementById('live-frame');
            iframe.src = url;
            iframe.style.display = 'block';
            document.getElementById('offline-msg').style.display = 'none';
            document.getElementById('current-title').innerText = "VOD: " + title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function listenToBooks() {
            db.ref('Books').on('value', snap => {
                const data = snap.val();
                saveToCache('books', data);
                renderBooks(data);
            });
        }

        function renderBooks(data) {
            const list = document.getElementById('books-list');
            list.innerHTML = '';
            if(data) {
                Object.values(data).reverse().forEach(b => {
                    const coverBg = b.cover ? `background-image: url('${b.cover}');` : '';
                    list.innerHTML += `
                        <a href="${b.link}" target="_blank" class="book-card">
                            <div class="book-cover" style="${coverBg}">
                                ${!b.cover ? '<i class="fas fa-book"></i>' : ''}
                            </div>
                            <div class="book-info">
                                <div>
                                    <h4 class="book-title">${b.title}</h4>
                                    <p class="book-author">${b.author}</p>
                                </div>
                                <div class="book-btn"><i class="fas fa-download"></i> አውርድ / አንብብ</div>
                            </div>
                        </a>
                    `;
                });
            } else {
                list.innerHTML = `<p style="text-align:center; color:var(--text-sub); grid-column: 1 / -1; padding: 20px;">ምንም የተጫነ መጽሐፍ የለም።</p>`;
            }
        }

        // 10. Chat System
        function sendComment() {
            const input = document.getElementById('chat-msg-in');
            const text = input.value.trim();
            if(!text) return;
            if(!isOnline) return alert("መልዕክት ለመላክ ኢንተርኔት ያስፈልጋል!");

            db.ref('LiveComments').push({
                uid: uid,
                name: userName,
                text: text,
                time: Date.now()
            });
            input.value = '';
        }

        document.getElementById('chat-msg-in').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendComment();
        });
        window.postMessage = sendComment; // EAKeyboard support

        function listenToComments() {
            const chatBox = document.getElementById('chat-messages');
            db.ref('LiveComments').limitToLast(50).on('child_added', snap => {
                const msg = snap.val();
                const isMine = msg.uid === uid;
                
                const div = document.createElement('div');
                div.className = `message ${isMine ? 'mine' : ''}`;
                div.innerHTML = `
                    ${!isMine ? `<div class="msg-name">${msg.name}</div>` : ''}
                    <div class="msg-text">${msg.text}</div>
                `;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
